baseURL = 'https://yixinyi.github.io/BasedKeto/'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false  # Changed to false
enableRobotsTXT = true
theme = "ananke"

[languages.en]
languageName = "English"
weight = 1
title = "BasedKeto"

[languages.zh]
languageName = "中文"
weight = 2
title = "根基生酮"

[params]
mainSections = ["posts"]
displayFullLangName = true
description = "Minimalist keto recipes and guides focused on real food, clean fats, and foundational ketogenic eating."

[params.buttondown]
enabled = true
username = "xinyi"

[languages.en.params]
mainSections = ["posts"]
description = "Minimalist keto recipes and guides focused on real food, clean fats, and foundational ketogenic eating."
newsletter_title = "Get new keto recipes by email"
newsletter_description = "Simple recipes and foundational keto notes, sent when there is something new."
newsletter_placeholder = "you@example.com"
newsletter_button = "Subscribe"
newsletter_privacy = "No spam. Unsubscribe anytime."

[languages.zh.params]
mainSections = ["posts"]
description = "根基生酮是一个极简生酮食谱与指南博客，专注真实食物、纯净脂肪和基础生酮饮食。"
